<!DOCTYPE html>
<!--
==================================================================================
  FAMILY VACATION TRIP PLANNER  —  PROJECT NOTES & NEXT STEPS
==================================================================================
  WHAT THIS IS
  Single-file web app (Tailwind via CDN, FontAwesome, Helvetica Neue stack, dark theme).
  It is DATA-DRIVEN from a published Google Sheet (CSV). On load it fetches the CSV,
  groups rows by Date into days, and renders each day as a "gold-dot" vertical timeline
  of expandable cards. Live weather + 10-day forecast via Open-Meteo (Sacramento).

  SHEET (source of truth)  — URL is in the SHEET_CSV_URL constant in the main script block.
  Columns: Date | Location | Accommodations | Time Segment | Activity / Event | Travel Notes
  Optional per-stop columns (all read from the Sheet, case-insensitive headers):
      Link         -> Yelp / Google Maps / website -> renders a smart "Open" button
      Description  -> shown inside the expandable card body (supports line breaks)
      Photo URL    -> optional image at the top of the expanded card
      Surprise     -> "Yes" hides this stop behind a mystery countdown card
      Reveal At    -> date+time (e.g. "7/22/2026 10:00 AM") when a Surprise stop uncovers
      Lat / Long   -> verified coordinates (added 6/2026). When present, these are the
                      MOST PRECISE source for both the day-route builder and the per-stop
                      "Open in Maps" button — they win over geocoding a Link or title.
                      A stop with coordinates but no Link still gets a working Maps button.
  Any stop with a Link / Description / Photo becomes a tappable, expandable card.
  Stops auto-sort within a day: Breakfast > Morning > Lunch > Afternoon > Dinner > Evening.

  PREVIEW NOTE
  In the chat preview the app can't reach Google, so it falls back to FALLBACK_ROWS
  (days Jul 12-14, with a few example Links). When HOSTED, the live CSV drives all days.

  -------------------------------------------------------------------------------
  NEXT STEPS (open items)
  -------------------------------------------------------------------------------
  1) HOST IT so the live Google Sheet actually drives the app.
     - Recommended: GitHub Pages (free, perfect for a single HTML file). Drop this file
       in a repo, enable Pages, open the URL on phones. Then the CSV fetch runs for real.
     - Watch for: Google's published-CSV endpoint usually allows browser fetches but
       doesn't guarantee CORS. If blocked once hosted, switch to a CORS-friendly endpoint
       or a tiny Apps Script proxy (one-line change).

  2) TWO-WAY EDITING  <-- LEANING THIS WAY (edit in-the-moment, no Sheets app needed).
     - Goal: the in-app Edit box writes changes back to the Google Sheet (today it's
       session-only and resets on refresh).
     - How: deploy a Google Apps Script bound to the Sheet as a Web App:
         * doGet()  -> returns the sheet as JSON (app reads this instead of/in addition to CSV)
         * doPost() -> receives an edited row and writes it back to the sheet
       Then point the app's save function at the Web App URL. ~5-min setup; Claude can
       provide the exact script + steps when you're ready.
     - Alternative (if you change your mind): keep it READ-ONLY — edit in Google Sheets
       directly, app just reflects it live. Simpler, no Apps Script.
==================================================================================
-->

            {Date:"7/14/2026",Location:"Sacramento",Accommodations:"D&D's House","Time Segment":"Dinner","Activity / Event":"Pizzasaurus Rex or Kodaiko Ramen & Bar","Travel Notes":N14,"Notas de viagem":N14_PT,"Link":"https://www.eatpizzasaurusrex.com/","Description":"Pizzasaurus Rex or Kodaiko Ramen & Bar: Choose between creative pizzas or authentic Japanese ramen for a delicious local dinner.","Descrição":"Pizzasaurus Rex ou Kodaiko Ramen & Bar: Escolher entre pizzas criativas ou autêntico ramen japonês para um jantar local delicioso."},
            {Date:"7/14/2026",Location:"Sacramento",Accommodations:"D&D's House","Time Segment":"Evening","Activity / Event":"Prep house to leave for trip - take out garbage, water plants, check lights and Cameras","Atividade/Evento":"Preparar a casa para a viagem — pôr o lixo fora, regar as plantas, verificar luzes e câmaras","Travel Notes":N14,"Notas de viagem":N14_PT,"Description":"Prep house to leave for trip: Ensure the house is ready for the trip by handling chores like watering plants and checking security.","Descrição":"Preparar a casa para a viagem: Deixar a casa pronta, tratando de tarefas como regar as plantas e verificar a segurança."}
        ];

        const SEG_ORDER = { breakfast:1, morning:2, lunch:3, afternoon:4, dinner:5, evening:6, night:7 };
        const SEG_LABEL_PT = { breakfast:'Pequeno-almoço', morning:'Manhã', lunch:'Almoço', afternoon:'Tarde', dinner:'Jantar', evening:'Noite', night:'Madrugada' };

        let TRIP = [];
        let currentDayIndex = 0;
        let editMode = false;
        let editTarget = { day:null, stop:null };

        // ============== LANGUAGE ==============
        function loadStoredLang(){ try { return localStorage.getItem('trip_lang') || 'en'; } catch(e){ return 'en'; } }

        let currentLang = loadStoredLang();

        // ============== TEXT SIZE ==============

        function storeTextSize(n){ try { localStorage.setItem('trip_textsize', String(n)); } catch(e){} }
        let currentTextSize = loadStoredTextSize();
        const TEXTSIZE_LABELS = ['A','A+','A++'];
        function applyTextSize(){
            document.documentElement.classList.remove('text-boost-1','text-boost-2');

        // Pick localized value: PT when active and present, else English.
        function L(en, pt){ return (currentLang === 'pt' && pt) ? pt : en; }
        function cap(s){ return s ? s.charAt(0).toUpperCase() + s.slice(1) : s; }
        function segLabel(stop){
            if (currentLang === 'pt') return stop.seg_pt || SEG_LABEL_PT[(stop.seg||'').toLowerCase()] || stop.seg;
            return stop.seg;
        }
        function linkLabel(lm){
            if (currentLang !== 'pt') return lm.label;
            const map = { 'View on Yelp':'Ver no Yelp', 'Open in Maps':'Abrir no Maps', 'View on TripAdvisor':'Ver no TripAdvisor', 'Instagram':'Instagram' };
            if (map[lm.label]) return map[lm.label];

        function updateLangButtons(){
            const en = document.getElementById('lang-en-btn');

        function setLang(l){

        // ============== DAY ROUTE (opens native Maps) ==============
        // Builds a Google Maps directions URL from the day's stops, in order.
        // No API key / library needed.
        //
        // Priority per stop: 1) verified Lat/Long from the Sheet (most precise —
        // no geocoding ambiguity at all), 2) a coordinate or place name pulled from
        // the stop's Link field, 3) the activity title + city name as a last resort
        // for stops with neither (e.g. "At Home", "Prep house to leave for trip"
        // aren't real searchable place names, so this fallback is intentionally weak).
        function extractMapPoint(url) {
            if (!url) return null;
            // Coordinates embedded in a Google Maps URL, e.g. ".../@38.447,-121.438,17z" — most accurate.
            let m = url.match(/@(-?\d{1,3}\.\d+),(-?\d{1,3}\.\d+)/);
            if (m) return `${m[1]},${m[2]}`;
            m = url.match(/[?&!]q=(-?\d{1,3}\.\d+),(-?\d{1,3}\.\d+)/);
            if (m) return `${m[1]},${m[2]}`;
            // The place name Google itself uses, e.g. ".../maps/place/High+Hand+Nursery/..."
            m = url.match(/\/maps\/place\/([^\/]+)/);
            if (m) {
                try { return decodeURIComponent(m[1].replace(/\+/g, ' ')); } catch (e) { /* fall through */ }
            }
            // Yelp business slug, e.g. ".../biz/in-n-out-burger-sacramento" — still more precise
            // than a bare activity title since it's the exact business Yelp has on file.
            m = url.match(/yelp\.[a-z.]+\/biz\/([^\/?#]+)/i);
            if (m) {
                const slug = decodeURIComponent(m[1]).replace(/-\d+$/, '').replace(/-/g, ' ');
                return slug;
            }
            return null;
        }
        function hasCoords(s) { return typeof s.lat === 'number' && typeof s.lng === 'number'; }
        function stopHasGeo(s) { return hasCoords(s) || (s.link && s.link.trim()); }
        function dayRouteURL(day) {
            const city = day.location ? day.location + ', CA' : 'Sacramento, CA';
            // Prefer stops with real geo data (a Lat/Long pair, or a Link) — these
            // geocode reliably. Only fall back to every stop (titles included) if
            // fewer than 2 stops have usable geo data.
            const geoed = day.stops.filter(stopHasGeo);
            const source = geoed.length >= 2 ? geoed : day.stops;
            const pts = source.map(s => {
                if (hasCoords(s)) return `${s.lat},${s.lng}`;
                const fromLink = extractMapPoint(s.link);
                if (fromLink) {
                    // Coordinate matches ("lat,lng") are precise on their own; name-based
                    // matches (Yelp slug, Maps place name) still benefit from city context.
                    const isCoord = /^-?\d{1,3}\.\d+,-?\d{1,3}\.\d+$/.test(fromLink);
                    return isCoord ? fromLink : `${fromLink}, ${city}`;
                }
                const t = (s.title || '').trim();
                return t ? `${t}, ${city}` : null;
            }).filter(Boolean);
            if (pts.length < 2) return null;
            const enc = encodeURIComponent;
            const origin = enc(pts[0]);
            const destination = enc(pts[pts.length - 1]);
            const waypoints = pts.slice(1, -1).map(enc).join('|');
            let url = `https://www.google.com/maps/dir/?api=1&travelmode=driving&origin=${origin}&destination=${destination}`;
            if (waypoints) url += `&waypoints=${waypoints}`;
            return url;
        }
        function openDayRoute(di){
            const u = dayRouteURL(TRIP[di]);
            if (u) window.open(u, '_blank', 'noopener');
        }

        // ============== SURPRISE COUNTDOWNS ==============
        function formatCountdown(ms) {
            if (ms <= 0) return '00:00:00';
            const totalSec = Math.floor(ms / 1000);
            const d = Math.floor(totalSec / 86400);
            const h = Math.floor((totalSec % 86400) / 3600);
            const m = Math.floor((totalSec % 3600) / 60);
            const s = totalSec % 60;
            const pad = n => String(n).padStart(2, '0');
            return d > 0 ? `${d}d ${pad(h)}:${pad(m)}:${pad(s)}` : `${pad(h)}:${pad(m)}:${pad(s)}`;
        }
        function tickSurpriseCountdowns() {
            const nodes = document.querySelectorAll('[data-surprise-reveal]');
            if (!nodes.length) return;
            let anyExpired = false;
            const now = Date.now();
            nodes.forEach(node => {
                const iso = node.getAttribute('data-surprise-reveal');
                if (!iso) return;
                const remain = new Date(iso).getTime() - now;
                if (remain <= 0) { anyExpired = true; return; }
                const span = node.querySelector('.surprise-countdown');
                if (span) span.textContent = formatCountdown(remain);
            });
            if (anyExpired) { renderDays(); switchDay(currentDayIndex); }
        }

        // ============== CLOCK ==============
        function startClock() {
            function update() {
                const opts = { weekday:'short', month:'short', day:'numeric', hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:true };
                const el = document.getElementById('live-clock');
                if (el) el.innerText = new Date().toLocaleString(undefined, opts);
            }
            update();
            setInterval(update, 1000);
        }

        // ============== WEATHER ==============
        const WEATHER_LOCATION = { name: 'Sacramento, CA', lat: 38.5816, lon: -121.4944 };
        function weatherFromCode(code) {
            if (code === 0) return { desc:'Clear', icon:'fa-sun', color:'text-caliGold-400' };
            if (code <= 3)  return { desc:'Partly cloudy', icon:'fa-cloud-sun', color:'text-slate-300' };
            if (code <= 48) return { desc:'Foggy', icon:'fa-smog', color:'text-slate-400' };
            if (code <= 67) return { desc:'Rain', icon:'fa-cloud-rain', color:'text-sky-300' };
            if (code <= 77) return { desc:'Snow', icon:'fa-snowflake', color:'text-sky-200' };
            if (code <= 82) return { desc:'Showers', icon:'fa-cloud-showers-heavy', color:'text-sky-300' };
            if (code >= 95) return { desc:'Storms', icon:'fa-cloud-bolt', color:'text-amber-300' };
            return { desc:'Mild', icon:'fa-sun', color:'text-caliGold-400' };
        }
        async function fetchLiveWeather() {
            document.getElementById('weather-place').innerText = WEATHER_LOCATION.name;
            const tempEl = document.getElementById('live-temp');
            const descEl = document.getElementById('live-desc');
            const iconEl = document.getElementById('live-weather-icon');
            try {
                const url = `https://api.open-meteo.com/v1/forecast?latitude=${WEATHER_LOCATION.lat}&longitude=${WEATHER_LOCATION.lon}`
                    + `&current_weather=true&daily=weathercode,temperature_2m_max,temperature_2m_min`
                    + `&temperature_unit=fahrenheit&timezone=auto&forecast_days=10`;
                const res = await fetch(url);
                if (!res.ok) throw new Error('weather');
                const data = await res.json();
                const w = weatherFromCode(data.current_weather.weathercode);
                tempEl.innerText = `${Math.round(data.current_weather.temperature)}\u00b0`;
                descEl.innerText = w.desc;
                iconEl.innerHTML = `<i class="fa-solid ${w.icon} ${w.color}"></i>`;
                renderForecast(data.daily);
            } catch (e) {
                tempEl.innerText = '75\u00b0'; descEl.innerText = 'Mild';
                iconEl.innerHTML = '<i class="fa-solid fa-sun text-caliGold-400"></i>';
                document.getElementById('forecast-banner').innerHTML =
                    '<div class="text-[10px] text-slate-500 py-3">Forecast loads once the app is hosted.</div>';
            }
        }
        function renderForecast(daily) {
            if (!daily || !daily.time) return;
            document.getElementById('forecast-banner').innerHTML = daily.time.map((iso,i) => {
                const d = new Date(iso + 'T12:00:00');
                const wd = d.toLocaleDateString('en-US',{weekday:'short'});
                const md = d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
                const w = weatherFromCode(daily.weathercode[i]);
                const hi = Math.round(daily.temperature_2m_max[i]);
                const lo = Math.round(daily.temperature_2m_min[i]);
                const today = i === 0;
                return `<div id="fc-${iso}" class="flex-none w-[52px] rounded-xl px-1.5 py-2 text-center ${today?'bg-caliGold-500/15 ring-1 ring-caliGold-500/40':'bg-white/[0.05]'}">
                    <div class="text-[9px] font-bold ${today?'text-caliGold-300':'text-slate-400'} uppercase">${today?'Now':wd}</div>
                    <div class="text-[8px] text-slate-500 mb-1">${md}</div>
                    <i class="fa-solid ${w.icon} ${w.color} text-sm"></i>
                    <div class="text-[10px] font-bold text-slate-100 mt-1">${hi}\u00b0</div>
                    <div class="text-[9px] text-slate-500">${lo}\u00b0</div>
                </div>`;
            }).join('');
        }
        function focusForecastDate(iso) {
            const el = document.getElementById(`fc-${iso}`);
            if (el) el.scrollIntoView({ behavior:'smooth', block:'nearest', inline:'center' });
        }

        // ============== CSV / TRIP DATA ==============
        function parseCSV(text) {
            const rows = []; let field='', row=[], inQ=false, i=0;
            while (i < text.length) {
                const c = text[i];
                if (inQ) {
                    if (c === '"') { if (text[i+1] === '"') { field+='"'; i+=2; continue; } inQ=false; i++; continue; }
                    field += c; i++; continue;
                }
                if (c === '"') { inQ=true; i++; continue; }
                if (c === ',') { row.push(field); field=''; i++; continue; }
                if (c === '\r') { i++; continue; }
                if (c === '\n') { row.push(field); rows.push(row); row=[]; field=''; i++; continue; }
                field += c; i++;
            }
            if (field.length || row.length) { row.push(field); rows.push(row); }
            return rows;
        }
        function rowsToObjects(matrix) {
            if (!matrix.length) return [];
            const header = matrix[0].map(h => h.trim());
            return matrix.slice(1)
                .filter(r => r.some(c => c && c.trim()))
                .map(r => { const o={}; header.forEach((h,idx)=> o[h]=(r[idx]||'').trim()); return o; });
        }
        function parseMDY(s) { const [m,d,y] = s.split('/').map(Number); return new Date(y, m-1, d); }

        // Case-insensitive column lookup: returns the first non-empty value whose
        // header matches any of the supplied names (ignoring case/extra spaces).
        // Lets your Sheet headers be "Link"/"link"/"Description"/"description" etc.
        function pick(o, ...names) {
            const keys = Object.keys(o);
            for (const n of names) {
                const k = keys.find(key => key.trim().toLowerCase() === n.toLowerCase());
                if (k && o[k] != null && String(o[k]).trim()) return String(o[k]).trim();
            }
            return '';
        }

        // Maps each English column to its Portuguese header name(s) in the Sheet.
        // Your published "Tidy Schedule" pairs each English column with a PT one:
        //   Location->Localização, Accommodations->Acomodações, Time Segment->Segmento de tempo,
        //   Activity / Event->Atividade/Evento, Travel Notes->Notas de viagem, Description->Descrição.
        const PT_HEADERS = {
            'location':         ['localização', 'localizacao'],
            'accommodations':   ['acomodações', 'acomodacoes'],
            'time segment':     ['segmento de tempo'],
            'activity / event': ['atividade/evento', 'atividade / evento'],
            'travel notes':     ['notas de viagem'],
            'description':      ['descrição', 'descricao']
        };
        // Finds the Portuguese sibling of an English column: first by its known PT name,
        // then by a fallback heuristic (English name + a "PT" marker, e.g. "Description (PT)").
        function pickPT(o, base) {
            const b = base.trim().toLowerCase();
            const keys = Object.keys(o);
            for (const name of (PT_HEADERS[b] || [])) {
                const k = keys.find(key => key.trim().toLowerCase() === name);
                if (k && o[k] != null && String(o[k]).trim()) return String(o[k]).trim();
            }
            const k = keys.find(key => {
                const n = key.trim().toLowerCase();
                return n !== b && n.startsWith(b) && (/\(pt\)|\bpt\b|portugu/.test(n));
            });
            if (k && o[k] != null && String(o[k]).trim()) return String(o[k]).trim();
            return '';
        }

        function buildTrip(objs) {
            const byDate = new Map();
            for (const o of objs) {
                const date = (o['Date']||'').trim(); if (!date) continue;
                if (!byDate.has(date)) byDate.set(date, { date, location:'', location_pt:'', accommodations:'', accommodations_pt:'', notes:'', notes_pt:'', stops:[] });
                const day = byDate.get(date);
                const loc = pick(o, 'Location'); if (loc) day.location = loc;
                const locPt = pickPT(o, 'Location'); if (locPt) day.location_pt = locPt;
                const acc = pick(o, 'Accommodations'); if (acc) day.accommodations = acc;
                const accPt = pickPT(o, 'Accommodations'); if (accPt) day.accommodations_pt = accPt;
                const tn = pick(o, 'Travel Notes');
                if (tn && tn.toLowerCase() !== 'none') day.notes = tn;
                const tnPt = pickPT(o, 'Travel Notes');
                if (tnPt && tnPt.toLowerCase() !== 'none') day.notes_pt = tnPt;
                let link = pick(o, 'Link', 'URL', 'Resource', 'Website', 'Yelp', 'Link / Resource');
                if (link && !/^https?:\/\//i.test(link)) link = 'https://' + link;  // tolerate "example.com" with no scheme
                // Description: a named column wins; '' catches an UNNAMED trailing column.
                const desc = pick(o, 'Description', 'Desc', 'Details', 'Summary', 'Notes / Description', '');
                const descPt = pickPT(o, 'Description') || pickPT(o, 'Desc') || pickPT(o, 'Details');
                const img  = pick(o, 'Photo URL', 'Photo', 'Image', 'Img', 'Image URL');
                const seg = pick(o, 'Time Segment');
                const segPt = pickPT(o, 'Time Segment');
                const title = pick(o, 'Activity / Event');
                const titlePt = pickPT(o, 'Activity / Event') || pickPT(o, 'Activity');
                const surpriseRaw = pick(o, 'Surprise', 'Hidden', 'Mystery');
                const surprise = /^(y|yes|true)/i.test(surpriseRaw);
                const revealAt = pick(o, 'Reveal At', 'Reveal Time', 'Reveal');
                // Lat/Long: the most precise location source available, when present.
                // Verified coordinates beat geocoding a business name or Link every time.
                const latRaw = pick(o, 'Lat', 'Latitude');
                const lngRaw = pick(o, 'Long', 'Lng', 'Longitude');
                const lat = latRaw !== '' && !isNaN(parseFloat(latRaw)) ? parseFloat(latRaw) : null;
                const lng = lngRaw !== '' && !isNaN(parseFloat(lngRaw)) ? parseFloat(lngRaw) : null;
                day.stops.push({ seg, seg_pt:segPt, title, title_pt:titlePt, link, desc, desc_pt:descPt, img, surprise, revealAt, lat, lng });
            }
            const days = [...byDate.values()];
            days.sort((a,b) => parseMDY(a.date) - parseMDY(b.date));
            for (const day of days) {
                day.stops.forEach((s,idx) => s._i = idx);
                day.stops.sort((a,b) => {
                    const ra = SEG_ORDER[a.seg.toLowerCase()] || 50;
                    const rb = SEG_ORDER[b.seg.toLowerCase()] || 50;
                    return ra - rb || a._i - b._i;
                });
            }
            return days;
        }

        // ============== RENDER ==============
        function dayTitle(day, i) {
            const loc = L(day.location, day.location_pt);
            if (loc) return loc;
            if (currentLang === 'pt') return i === 0 ? 'Chegada' : (i === TRIP.length-1 ? 'Partida' : 'Dia de viagem');
            return i === 0 ? 'Arrival' : (i === TRIP.length-1 ? 'Departure' : 'Travel Day');
        }
        function renderTabs() {
            const locale = currentLang === 'pt' ? 'pt-PT' : 'en-US';
            document.getElementById('day-tabs').innerHTML = TRIP.map((day,i) => {
                const d = parseMDY(day.date);
                const wd = cap(d.toLocaleDateString(locale,{weekday:'short'}).replace('.',''));
                const md = cap(d.toLocaleDateString(locale,{month:'short',day:'numeric'}).replace('.',''));
                const active = i === currentDayIndex;
                const cls = active
                    ? 'flex-none px-3.5 py-2 rounded-xl font-bold text-center text-xs tab-transition bg-caliGold-500 text-slate-950 shadow-sm'
                    : 'flex-none px-3.5 py-2 rounded-xl font-bold text-center text-xs tab-transition bg-[#3a4578] border border-white/10 text-slate-300 hover:bg-white/5';
                return `<button id="tab-${i}" onclick="switchDay(${i})" class="${cls}">
                    <span class="block text-[8px] opacity-70 uppercase">${md}</span>${wd}</button>`;
            }).join('');
        }

        function linkMeta(url) {
            const u = url.toLowerCase();
            if (u.includes('yelp.')) return { label:'View on Yelp', icon:'fa-brands fa-yelp' };
            if (u.includes('google.com/maps') || u.includes('maps.app') || u.includes('goo.gl/maps') || u.includes('maps.google')) return { label:'Open in Maps', icon:'fa-solid fa-location-dot' };
            if (u.includes('tripadvisor.')) return { label:'View on TripAdvisor', icon:'fa-brands fa-tripadvisor' };
            if (u.includes('instagram.')) return { label:'Instagram', icon:'fa-brands fa-instagram' };
            let host = 'link';
            try { host = new URL(url).hostname.replace('www.',''); } catch (e) {}
            return { label:'Open ' + host, icon:'fa-solid fa-arrow-up-right-from-square' };
        }

        function stopCardHTML(day, di, stop, si) {
            const title = L(stop.title, stop.title_pt);
            const desc  = L(stop.desc, stop.desc_pt);
            const seg   = segLabel(stop);
            const dot = `<span class="absolute left-[7px] top-[18px] w-3 h-3 rounded-full bg-caliGold-500 ring-4 ring-[#1b1430] z-10"></span>`;

            // EDIT MODE: compact row + pencil (keeps the editing list scannable).
            if (editMode) {
                return `
                <div class="relative pl-7">
                    ${dot}
                    <div class="bg-gradient-to-b from-[#3a4578] to-[#262c52] rounded-2xl shadow-sm ring-1 ring-white/10 overflow-hidden">
                        <div class="w-full flex justify-between items-center gap-3 px-3.5 py-3">
                            <div class="min-w-0">
                                <div class="text-[9px] font-bold uppercase tracking-[0.12em] text-caliGold-400 mb-0.5">${seg || ''}</div>
                                <h3 class="text-[13.5px] font-bold text-white leading-snug">${title}</h3>
                            </div>
                            <button onclick="openEditForm(${di},${si})" class="flex-none w-8 h-8 rounded-full bg-caliGold-500/15 text-caliGold-400 flex items-center justify-center hover:bg-caliGold-500/25 transition-colors"><i class="fa-solid fa-pen text-[11px]"></i></button>
                        </div>
                    </div>
                </div>`;
            }

            // SURPRISE STOPS: if marked Surprise in the Sheet and its Reveal At time hasn't
            // passed yet, show a covered "mystery" card with a live countdown instead of the
            // real activity. Once the Reveal At time passes, it automatically uncovers —
            // no one needs to remember to edit anything in the Sheet that day.
            if (stop.surprise) {
                const revealDate = stop.revealAt ? new Date(stop.revealAt) : null;
                const validReveal = revealDate && !isNaN(revealDate.getTime());
                if (!validReveal || new Date() < revealDate) {
                    return `
                    <div class="relative pl-7" data-surprise-reveal="${validReveal ? revealDate.toISOString() : ''}">
                        ${dot}
                        <div class="bg-gradient-to-b from-caliGold-600/25 to-[#262c52] rounded-2xl shadow-sm ring-1 ring-caliGold-500/30 p-4 text-center">
                            <div class="text-[9px] font-bold uppercase tracking-[0.12em] text-caliGold-400 mb-1">${seg || ''}</div>
                            <i class="fa-solid fa-gift text-2xl text-caliGold-400 mb-1.5"></i>
                            <h3 class="text-[13px] font-bold text-white leading-snug">${L('A surprise is waiting…', 'Uma surpresa à espera…')}</h3>
                            ${validReveal ? `
                            <p class="text-[10px] text-slate-300 mt-1">${L('Revealed in', 'Revela-se em')}</p>
                            <div class="surprise-countdown text-lg font-black text-caliGold-300 tracking-wide mt-0.5 font-mono">--:--:--</div>` : ''}
                        </div>
                    </div>`;
                }
            }


            const hasImg  = stop.img && stop.img.trim().length > 0;
            const hasDesc = desc && desc.trim().length > 0;
            const hasLink = stop.link && stop.link.trim().length > 0;

            const thumb = hasImg ? `
                <img src="${stop.img}" alt="${title}" loading="lazy" class="flex-none w-12 h-12 rounded-xl object-cover bg-slate-700" onerror="this.style.display='none';">` : '';
            const descHtml = hasDesc ? `<p class="text-[12px] text-slate-300 leading-relaxed mt-2">${desc.replace(/\n/g,'<br>')}</p>` : '';
            let linkHtml = '';
            if (hasLink) {
                const lm = linkMeta(stop.link);
                linkHtml = `<a href="${stop.link}" target="_blank" rel="noopener noreferrer" class="flex items-center justify-center gap-2 w-full py-2 rounded-xl bg-caliGold-500/15 text-caliGold-300 font-bold text-[12px] hover:bg-caliGold-500/25 transition-colors mt-2.5"><i class="${lm.icon}"></i> ${linkLabel(lm)}</a>`;
            } else if (hasCoords(stop)) {
                // No Link in the Sheet, but we do have verified coordinates — still give
                // a working "Open in Maps" button instead of leaving the stop with none.
                const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${stop.lat},${stop.lng}`;
                linkHtml = `<a href="${mapsUrl}" target="_blank" rel="noopener noreferrer" class="flex items-center justify-center gap-2 w-full py-2 rounded-xl bg-caliGold-500/15 text-caliGold-300 font-bold text-[12px] hover:bg-caliGold-500/25 transition-colors mt-2.5"><i class="fa-solid fa-location-dot"></i> ${L('Open in Maps','Abrir no Maps')}</a>`;
            }

            return `
            <div class="relative pl-7">
                ${dot}
                <div class="bg-gradient-to-b from-[#3a4578] to-[#262c52] rounded-2xl shadow-sm ring-1 ring-white/10 p-3.5">
                    <div class="flex items-start gap-3">
                        ${thumb}
                        <div class="min-w-0 flex-1">
                            <div class="text-[9px] font-bold uppercase tracking-[0.12em] text-caliGold-400 mb-0.5">${seg || ''}</div>
                            <h3 class="text-[13.5px] font-bold text-white leading-snug">${title}</h3>
                        </div>
                    </div>
                    ${descHtml}
                    ${linkHtml}
                </div>
            </div>`;
        }

        function renderDayCard(day, di) {
            const d = parseMDY(day.date);
            const locale = currentLang === 'pt' ? 'pt-PT' : 'en-US';
            const dateLabel = cap(d.toLocaleDateString(locale,{weekday:'long', month:'long', day:'numeric'}));
            const stayLabel = L('Spending the Night', 'Onde Vai Dormir');
            const accom = L(day.accommodations, day.accommodations_pt);
            const stayHtml = accom ? `
                <div class="flex items-center gap-2.5 py-2 px-3 rounded-xl bg-white/[0.06] ring-1 ring-white/10 mt-3">
                    <i class="fa-solid fa-house-chimney text-caliGold-400 text-[11px]"></i>
                    <div class="flex flex-col leading-tight">
                        <span class="text-[9px] font-extrabold uppercase tracking-[0.08em] text-slate-400">${stayLabel}</span>
                        <span class="text-[12px] font-bold text-slate-100">${accom}</span>
                    </div>
                </div>` : '';
            const notes = L(day.notes, day.notes_pt);
            const notesLabel = L('Travel Notes', 'Notas de Viagem');
            const noteLines = notes ? notes.split('\n').map(l => l.trim()).filter(Boolean) : [];
            const notesHtml = noteLines.length ? `
                <div class="flex items-start gap-2.5 py-2 px-3 rounded-xl bg-white/[0.06] ring-1 ring-white/10 mt-2">
                    <i class="fa-solid fa-car text-caliGold-400 text-[11px] mt-1"></i>
                    <div class="flex flex-col gap-1 min-w-0">
                        <span class="text-[9px] font-extrabold uppercase tracking-[0.08em] text-slate-400">${notesLabel}</span>
                        <div class="space-y-0.5 leading-snug text-[11px] text-slate-200">${noteLines.map(l => noteLines.length > 1
                            ? `<div class="flex gap-1.5"><span class="text-caliGold-400">•</span><span>${l}</span></div>`
                            : `<div>${l}</div>`).join('')}</div>
                    </div>
                </div>` : '';
            const routeHtml = dayRouteURL(day) ? `
                <button onclick="openDayRoute(${di})" class="map-bg-route w-full flex items-center justify-center gap-2 py-2 rounded-xl text-slate-100 font-bold text-[12px] uppercase tracking-wide ring-1 ring-white/10 transition-colors mt-2">
                    <span><i class="fa-solid fa-route text-caliGold-400"></i> ${L("See today's route", 'Ver a rota de hoje')}</span>
                </button>` : '';
            const editBtn = `<button onclick="toggleEditMode()" class="${editMode
                ? 'flex items-center gap-1.5 text-[10px] font-bold px-3 py-1.5 rounded-full bg-caliGold-500 text-slate-950 transition-colors'
                : 'flex items-center gap-1.5 text-[10px] font-bold px-3 py-1.5 rounded-full bg-white/10 text-slate-300 hover:bg-white/15 transition-colors'}">${editMode?`<i class="fa-solid fa-check"></i> ${L('Done','Concluído')}`:`<i class="fa-solid fa-pen"></i> ${L('Edit','Editar')}`}</button>`;
            const noStops = L('No activities listed for this day yet.', 'Ainda não há atividades para este dia.');
            const timeline = day.stops.length
                ? `<div class="space-y-3 relative before:absolute before:top-2 before:bottom-2 before:left-[12px] before:w-0.5 before:bg-white/10">${day.stops.map((s,si)=>stopCardHTML(day,di,s,si)).join('')}</div>`
                : `<div class="text-[12px] text-slate-500 py-6 text-center">${noStops}</div>`;
            return `
            <div id="day-card-${di}" class="hidden space-y-4">
                <div>
                    <div class="flex items-start justify-between gap-3">
                        <div>
                            <span class="text-[9px] font-bold uppercase tracking-[0.15em] text-slate-500">${dateLabel}</span>
                            <h2 class="text-xl font-extrabold text-white tracking-tight">${dayTitle(day,di)}</h2>
                        </div>
                        ${editBtn}
                    </div>
                    ${stayHtml}
                    ${notesHtml}
                    ${routeHtml}
                </div>
                ${timeline}
            </div>`;
        }

        function renderDays() {
            document.getElementById('days-container').innerHTML = TRIP.map((day,i)=>renderDayCard(day,i)).join('');
        }

        // ============== INTERACTION ==============
        function toggleStop(di, si) {
            const body = document.getElementById(`stop-body-${di}-${si}`);
            const chev = document.getElementById(`stop-chev-${di}-${si}`);
            const row  = document.getElementById(`stop-row-${di}-${si}`);
            if (!body) return;
            const open = body.classList.toggle('open');
            if (chev) chev.classList.toggle('open', open);
            if (row)  row.classList.toggle('text-caliGold-400', open);
        }
        function toggleEditMode() {
            editMode = !editMode;
            renderDays();
            switchDay(currentDayIndex);
        }
        function openEditForm(di, si) {
            editTarget = { day:di, stop:si };
            const stop = TRIP[di].stops[si];
            document.getElementById('edit-title').value = stop.title || '';
            document.getElementById('edit-seg').value   = stop.seg || '';
            document.getElementById('edit-link').value  = stop.link || '';
            document.getElementById('edit-desc').value  = stop.desc || '';
            document.getElementById('edit-img').value   = stop.img || '';
            const m = document.getElementById('edit-modal');
            const c = document.getElementById('edit-modal-content');
            m.classList.remove('opacity-0','pointer-events-none');
            c.classList.remove('translate-y-full','sm:translate-y-10');
            c.classList.add('translate-y-0');
            document.body.style.overflow = 'hidden';
        }
        function closeEditForm() {
            const m = document.getElementById('edit-modal');
            const c = document.getElementById('edit-modal-content');
            c.classList.remove('translate-y-0');
            c.classList.add('translate-y-full','sm:translate-y-10');
            m.classList.add('opacity-0','pointer-events-none');
            document.body.style.overflow = 'auto';
        }
        function saveEdit() {
            const { day:di, stop:si } = editTarget;
            if (di === null) return;
            const stop = TRIP[di].stops[si];
            stop.title = document.getElementById('edit-title').value.trim();
            stop.seg   = document.getElementById('edit-seg').value.trim();
            stop.link  = document.getElementById('edit-link').value.trim();
            stop.desc  = document.getElementById('edit-desc').value.trim();
            stop.img   = document.getElementById('edit-img').value.trim();
            // Session-only for now. Writing back to the Sheet needs a deployed Apps Script endpoint.
            closeEditForm();
            renderDays();
            switchDay(currentDayIndex);
        }
        function switchDay(index) {
            currentDayIndex = index;
            TRIP.forEach((_, i) => {
                const tab = document.getElementById(`tab-${i}`);
                const card = document.getElementById(`day-card-${i}`);
                const active = i === index;
                if (tab) tab.className = active
                    ? 'flex-none px-3.5 py-2 rounded-xl font-bold text-center text-xs tab-transition bg-caliGold-500 text-slate-950 shadow-sm'
                    : 'flex-none px-3.5 py-2 rounded-xl font-bold text-center text-xs tab-transition bg-[#3a4578] border border-white/10 text-slate-300 hover:bg-white/5';
                if (card) card.classList.toggle('hidden', !active);
                if (active && tab) tab.scrollIntoView({ behavior:'smooth', block:'nearest', inline:'center' });
            });
            const day = TRIP[index];
            if (day) {
                const iso = parseMDY(day.date).toISOString().slice(0,10);
                focusForecastDate(iso);
            }
        }

        // ============== LOAD ==============
        async function loadTrip() {
            let objs = null;
            try {
                const res = await fetch(SHEET_CSV_URL, { redirect:'follow' });
                if (!res.ok) throw new Error('sheet');
                const text = await res.text();
                objs = rowsToObjects(parseCSV(text));
                if (!objs.length) throw new Error('empty');
            } catch (e) {
                objs = FALLBACK_ROWS;  // preview / offline
            }
            TRIP = buildTrip(objs);
            renderTabs();
            renderDays();
            switchDay(0);
            updateLangButtons();
        }

        window.onload = function() {
            document.documentElement.lang = currentLang;
            applyTextSize();
            startClock();
            fetchLiveWeather();
            loadTrip();
            setInterval(tickSurpriseCountdowns, 1000);
        };
    </script>
</body>
</html>
